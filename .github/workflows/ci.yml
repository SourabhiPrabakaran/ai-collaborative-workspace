name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json

    - name: Install Client dependencies
      run: |
        cd client
        npm ci

    - name: Install Server dependencies
      run: |
        cd server
        npm ci

    - name: Build Client
      run: |
        cd client
        npm run build

    - name: Test Server Startup
      env:
        PORT: 5000
        MONGODB_URI: mongodb://127.0.0.1:27017/ci_test
        JWT_SECRET: ci_test_jwt_secret_key_placeholder
        GEMINI_API_KEY: ci_test_gemini_api_key_placeholder
        NODE_ENV: development
      run: |
        cd server
        # Start server in background
        npm start &
        SERVER_PID=$!
        # Wait 5 seconds to verify boot
        sleep 5
        # Check if the process is still running
        if ps -p $SERVER_PID > /dev/null; then
          echo "Server started successfully and is running on PID $SERVER_PID."
          kill $SERVER_PID
        else
          echo "Server failed to start."
          exit 1
        fi
